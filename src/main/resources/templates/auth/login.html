<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | 書籍管理システム</title>
    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>
<body>
<div class="login-container">
    <div class="background-shape background-shape-top" aria-hidden="true"></div>
    <div class="background-shape background-shape-bottom" aria-hidden="true"></div>
    <div class="decorative-ring" aria-hidden="true"></div>
    <div class="decorative-dots" aria-hidden="true"></div>

    <main class="login-shell">
        <section class="brand-panel" aria-labelledby="brand-title">
            <div class="brand-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M6 3h10.5A2.5 2.5 0 0 1 19 5.5V21H7a2 2 0 0 1-2-2V4a1 1 0 0 1 1-1Z"/>
                    <path d="M7 17h12"/>
                    <path d="M8.5 7h7"/>
                    <path d="M8.5 10.5h5"/>
                </svg>
            </div>
            <h1 id="brand-title">書籍管理システム</h1>
            <p class="brand-lead">書籍の登録・管理を効率化し、チームの生産性を向上させます。</p>

            <div class="feature-list" aria-label="システムの特徴">
                <div class="feature-item">
                    <span class="feature-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" focusable="false">
                            <path d="M12 3 5.5 5.5v5.7c0 4.1 2.6 7.8 6.5 9.1 3.9-1.3 6.5-5 6.5-9.1V5.5L12 3Z"/>
                            <path d="m9.4 12.1 1.8 1.8 3.9-4.2"/>
                        </svg>
                    </span>
                    <span>
                        <strong>安全なデータ管理</strong>
                        <small>高度なセキュリティでデータを保護</small>
                    </span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" focusable="false">
                            <path d="M16 11a4 4 0 1 0-8 0"/>
                            <path d="M3.5 20a6.5 6.5 0 0 1 13 0"/>
                            <path d="M17 9.5a3 3 0 0 1 3 3"/>
                            <path d="M18.5 20H22a4.5 4.5 0 0 0-4.5-4.5"/>
                        </svg>
                    </span>
                    <span>
                        <strong>チームで簡単共有</strong>
                        <small>リアルタイムで情報を共有・同期</small>
                    </span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" focusable="false">
                            <path d="M5 20V10"/>
                            <path d="M12 20V5"/>
                            <path d="M19 20v-7"/>
                        </svg>
                    </span>
                    <span>
                        <strong>業務を効率化</strong>
                        <small>直感的な操作で日々の業務をサポート</small>
                    </span>
                </div>
            </div>
        </section>

        <section class="form-panel" aria-label="ログインフォーム">
            <form class="login-form" th:action="@{/login}" method="post">
                <div class="form-heading">
                    <h2>ログイン</h2>
                    <p>アカウントにサインインしてください</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger" role="alert">
                    <svg class="alert-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
                    </svg>
                    <span class="sr-only">エラー</span>
                    <span class="alert-title">メールアドレスまたはパスワードが正しくありません。</span>
                </div>

                <div th:if="${param.logout}" class="alert alert-success" role="status">
                    <svg class="alert-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM8.7 13.8 5.9 11a1 1 0 1 1 1.4-1.4l1.4 1.4 4-4a1 1 0 0 1 1.4 1.4l-4.7 4.7a1 1 0 0 1-.7.3Z"/>
                    </svg>
                    <span class="sr-only">完了</span>
                    <span class="alert-title">ログアウトしました。</span>
                </div>

                <div class="form-group">
                    <label for="username" class="form-label">メールアドレス</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                            <path d="M4 6.5h16v11H4z"/>
                            <path d="m4.5 7 7.5 6 7.5-6"/>
                        </svg>
                        <input type="email" name="username" id="username" class="form-input" placeholder="name@company.com" autocomplete="username" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">パスワード</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                            <rect x="5" y="10" width="14" height="10" rx="2"/>
                            <path d="M8 10V8a4 4 0 0 1 8 0v2"/>
                        </svg>
                        <input type="password" name="password" id="password" placeholder="••••••••" class="form-input" autocomplete="current-password" required />
                    </div>
                </div>

                <button type="submit" class="login-button">
                    <span>ログイン</span>
                    <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                        <path d="M5 12h14"/>
                        <path d="m13 6 6 6-6 6"/>
                    </svg>
                </button>
            </form>
        </section>
    </main>

    <footer class="login-footer">Copyright SOLXYZ Co., Ltd. All Rights Reserved.</footer>
</div>
</body>
</html>
